<section class="py-24 bg-gradient-to-br from-blue-600 to-indigo-700 relative overflow-hidden">
    <div class="absolute inset-0 opacity-10">
        <div class="absolute top-0 right-0 w-96 h-96 bg-white rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-white rounded-full blur-3xl"></div>
    </div>

    <div class="max-w-7xl mx-auto px-6 relative">
        <div class="grid lg:grid-cols-2 gap-12 items-center">
            <div class="space-y-8">
                <div
                    class="inline-flex items-center gap-2 bg-white/20 text-white px-4 py-2 rounded-full text-sm font-medium backdrop-blur-sm">
                    <i class="bi bi-stars w-4 h-4"></i>
                    Gratuito para começar
                </div>

                <div class="space-y-4">
                    <h2 class="text-4xl lg:text-5xl font-bold text-white leading-tight">
                        Junte-se à revolução do conhecimento
                    </h2>
                    <p class="text-xl text-blue-100 leading-relaxed">
                        Faça parte de uma comunidade que valoriza o rigor acadêmico sem sacrificar a acessibilidade e o
                        engajamento.
                    </p>
                </div>

                <div class="flex flex-col sm:flex-row gap-4">
                    <button  (click)="redirecionarParaCadastro()"
                        class="bg-white hover:bg-slate-100 text-blue-600 px-8 py-4 rounded-lg font-bold flex items-center justify-center gap-2 transition-colors shadow-xl">
                        Criar Conta Gratuita
                        <i class="bi bi-arrow-right w-5 h-5"></i>
                    </button>
                </div>

                <div class="flex items-center gap-8 pt-4">
                    <div>
                        <div class="text-3xl font-bold text-white">0</div>
                        <div class="text-blue-200 text-sm">Pesquisadores</div>
                    </div>
                    <div>
                        <div class="text-3xl font-bold text-white">0</div>
                        <div class="text-blue-200 text-sm">Publicações</div>
                    </div>
                    <div>
                        <div class="text-3xl font-bold text-white">0</div>
                        <div class="text-blue-200 text-sm">Instituições</div>
                    </div>
                </div>
            </div>

            <div class="relative hidden lg:block">
                <div class="absolute -inset-4 bg-white rounded-2xl blur-2xl opacity-10"></div>
               
            </div>
        </div>
    </div>
</section>
