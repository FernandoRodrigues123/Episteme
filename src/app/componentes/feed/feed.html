<div id="feed" class="min-h-screen bg-slate-100 py-10">

  <div class="max-w-4xl mx-auto px-4">



    <div
     *ngFor="let publicacao of publicacaoesPage().content"
      class="bg-white rounded-2xl shadow-md border border-slate-200 mb-6 overflow-hidden"
      (click)="handleClick(publicacao.id)"
    >

      <!-- CABEÇALHO -->
      <div class="flex items-center gap-4 p-5 border-b border-slate-100">

        <img
          [src]="publicacao.estudante.urlImagem || 'https://placehold.co/80'"
          alt="Foto do estudante"
          class="w-14 h-14 rounded-full object-cover border"
        />

        <div>
          <h2 class="font-semibold text-slate-900">
            {{ publicacao.estudante.nome }}
          </h2>

          <p class="text-sm text-slate-500">
            {{ publicacao.estudante.areaDeEstudo }}
          </p>
        </div>

      </div>

      <!-- CONTEÚDO -->
      <div class="p-6">

        <h3 class="text-2xl font-bold text-slate-900 mb-4">
          {{ publicacao.titulo }}
        </h3>

        <p class="text-slate-700 whitespace-pre-line leading-relaxed">
          {{ publicacao.corpo }}
        </p>

      </div>

      <!-- RODAPÉ -->
      <div
        class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center"
      >

        <a
          *ngIf="publicacao.referencias"
          [href]="publicacao.referencias"
          target="_blank"
          class="text-blue-600 hover:text-blue-800 font-medium"
        >
          Ver referência
        </a>

        <div class="text-slate-500 text-sm">
          ❤️ {{ publicacao.estudantesLikes.length }}
        </div>

      </div>

    </div>

  </div>

</div>
