<div class="min-h-screen bg-gradient-to-b from-slate-100 to-slate-200 py-10 px-4">

  <div *ngIf="carregando()"
       class="text-center text-slate-500 text-lg">
    Carregando publicação...
  </div>

  <div *ngIf="publicacao() as pub"
       class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">

    <!-- BANNER -->
    <div class="h-32 bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600"></div>

    <!-- CABEÇALHO -->
    <div  class="px-8 pb-6">

      <div class="flex flex-col sm:flex-row sm:items-center gap-4 -mt-12">

        <img
          [src]="pub.estudante?.fotoPerfil || 'https://placehold.co/200x200'"
          alt="Foto perfil"
          class="w-24 h-24 rounded-full border-4 border-white shadow-lg object-cover bg-white"
        />

        <div id="nome-data">

          <h2 id="nome" class="text-2xl font-bold text-slate-900">
            {{ pub.estudante?.nome }}
          </h2>

          <p id="data-criacao" class="text-slate-500">
            Publicado em {{ pub.dataCriacao || "10/10/2023 10:00" | date:'dd/MM/yyyy HH:mm' }}
          </p>

        </div>

      </div>

    </div>

    <!-- CONTEÚDO -->
    <div class="px-8 pb-10">

      <h1
        class="text-4xl md:text-5xl font-extrabold text-slate-900 leading-tight mb-8">
        {{ pub.titulo }}
      </h1>

      <div
        class="prose prose-lg max-w-none text-slate-700 leading-9 whitespace-pre-line">

        {{ pub.corpo }}

      </div>

      <!-- REFERÊNCIAS -->
      <div *ngIf="pub.referencias"
           class="mt-10 pt-6 border-t border-slate-200">

        <h3
          class="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M13.828 10.172a4 4 0 015.656 5.656l-3 3a4 4 0 01-5.656-5.656m-1.414-1.414a4 4 0 00-5.656 5.656l3 3a4 4 0 005.656-5.656"/>

          </svg>

          Referência

        </h3>

        <a
          [href]="pub.referencias"
          target="_blank"
          class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 hover:underline break-all">

          {{ pub.referencias }}

        </a>

      </div>

      <!-- RODAPÉ -->
      <div
        class="mt-10 pt-6 border-t border-slate-200 flex items-center justify-between">

        <div class="text-sm text-slate-500">
          Compartilhado na comunidade Episteme
        </div>

        <div class="flex gap-3">

          <button
            class="px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 transition">
            👍 Curtir
          </button>

          <button
            class="px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 transition">
            💬 Comentar
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
