<div class="min-h-screen bg-slate-100 py-10 px-4">

    <div *ngIf="carregando()"
         class="text-center text-slate-500 text-lg">
      Carregando publicação...
    </div>

    <div *ngIf="publicacao() as pub"
         class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">

      <!-- CABEÇALHO -->
      <div class="flex items-center gap-4 p-6 border-b border-slate-200 bg-slate-50">

        <img
          [src]="pub.estudante?.fotoPerfil"
          alt="Foto perfil"
          class="w-16 h-16 rounded-full object-cover border"
        />

        <div>

          <h2 class="text-xl font-bold text-slate-900">
            {{ pub.estudante?.nome }}
          </h2>

          <p class="text-sm text-slate-500">
            {{ pub.dataCriacao | date:'dd/MM/yyyy HH:mm' }}
          </p>

        </div>

      </div>

      <!-- CONTEÚDO -->
      <div class="p-8 space-y-6">

        <h1 class="text-4xl font-extrabold text-slate-900 leading-tight">
          {{ pub.titulo }}
        </h1>

        <div class="text-slate-700 leading-8 text-lg whitespace-pre-line">
          {{ pub.corpo }}
        </div>

        <!-- REFERÊNCIA -->
        <div *ngIf="pub.referencias"
             class="pt-4 border-t border-slate-200">

          <h3 class="font-semibold text-slate-800 mb-2">
            Referência
          </h3>

          <a
            [href]="pub.referencias"
            target="_blank"
            class="text-blue-600 hover:underline break-all"
          >
            {{ pub.referencias }}
          </a>

        </div>

      </div>

    </div>

  </div>
